<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base64 Image Previewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #0f0f0f;
      color: #e5e5e5;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      gap: 2rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #666;
      text-transform: uppercase;
    }

    #input-section {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    label {
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 0.03em;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #ccc;
      font-family: monospace;
      font-size: 0.78rem;
      padding: 0.75rem 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus {
      border-color: #555;
    }

    textarea::placeholder {
      color: #444;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
    }

    button {
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.15s, opacity 0.15s;
    }

    #btn-clear {
      background: #222;
      color: #888;
      border: 1px solid #2e2e2e;
    }

    #btn-clear:hover { color: #ccc; border-color: #444; }

    #error {
      display: none;
      color: #f87171;
      font-size: 0.82rem;
    }

    #preview-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 900px;
    }

    #preview {
      max-width: 100%;
      max-height: 75vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    #meta {
      font-size: 0.78rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Base64 Previewer</h1>

  <section id="input-section">
    <label for="b64input">Paste base64 string or data URI</label>
    <textarea id="b64input" placeholder="iVBORw0KGgo...  or  data:image/png;base64,..."></textarea>
    <div class="actions">
      <button id="btn-clear">Clear</button>
    </div>
    <span id="error"></span>
  </section>

  <section id="preview-section">
    <img id="preview" alt="Preview" />
    <span id="meta"></span>
  </section>

  <script>
    const textarea      = document.getElementById('b64input');
    const btnClear      = document.getElementById('btn-clear');
    const errorEl       = document.getElementById('error');
    const previewSection = document.getElementById('preview-section');
    const preview       = document.getElementById('preview');
    const meta          = document.getElementById('meta');

    function sanitizeBase64(raw) {
      // Strip whitespace (common when copying multi-line base64)
      let str = raw.trim().replace(/\s+/g, '');
      // Convert URL-safe base64 variants
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      // Restore + that were mangled to spaces by URL query parsing
      str = str.replace(/ /g, '+');
      return str;
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      previewSection.style.display = 'none';
    }

    function clearError() {
      errorEl.textContent = '';
      errorEl.style.display = 'none';
    }

    function renderImage(raw) {
      clearError();

      if (!raw) {
        showError('Please paste a base64 string first.');
        return;
      }

      const cleaned = sanitizeBase64(raw);
      const src = cleaned.startsWith('data:') ? cleaned : `data:image/png;base64,${cleaned}`;

      preview.onerror = () => showError('Could not render image — invalid or unsupported base64.');

      preview.onload = () => {
        previewSection.style.display = 'flex';
        meta.textContent = `${preview.naturalWidth} × ${preview.naturalHeight} px`;
      };

      preview.src = src;
    }

    textarea.addEventListener('input', () => renderImage(textarea.value));

    btnClear.addEventListener('click', () => {
      textarea.value = '';
      preview.src = '';
      previewSection.style.display = 'none';
      clearError();
    });

  </script>
</body>
</html>
